{% set name = "scikit-misc" %}
{% set version = "0.5.2" %}

# ensure is_freethreading gets detected as a used variable
# [is_freethreading]

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/scikit_misc/scikit_misc-{{ version }}.tar.gz
  sha256: 49fa30e4051b341edc7422db66a12c0f59d468729285bfe644d10924dc51be0a

build:
  number: 0
  skip: true  # [win or py<310]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - pkg-config                             # [build_platform != target_platform]
    - ninja                                  # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
    - {{ compiler("fortran") }}
  host:
    - python
    - cython
    - meson-python
    - python-build
    - setuptools
    - pkg-config
    - pip
    - numpy
  run:
    - python
    - numpy

# the top-level build.{sh,bat} builds scikit-misc, and then
# build-output.{sh,bat} installs the files
outputs:
  - name: scikit-misc
    script: build-output.sh
    requirements:
      build:
        - python                                 # [build_platform != target_platform]
        - cross-python_{{ target_platform }}     # [build_platform != target_platform]
        # only need these for the strong run exports
        - {{ compiler('c') }}
        - {{ stdlib('c') }}
        - {{ compiler('fortran') }}
      host:
        - python
        - cython
        - meson-python
        - python-build
        - setuptools
        - pkg-config
        - pip
        - numpy
      run:
        - python
        - numpy
    test:
      imports:
        - skmisc
        - skmisc.loess

about:
  home: https://github.com/has2k1/scikit-misc
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Miscellaneous tools for data analysis and scientific computing.
  doc_url: https://has2k1.github.io/scikit-misc
  dev_url: https://github.com/has2k1/scikit-misc

extra:
  recipe-maintainers:
    - has2k1
    - yihming
    - bli25
